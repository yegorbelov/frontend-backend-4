services:
  backend1:
    build: .
    environment:
      PORT: '3000'
      BACKEND_LABEL: backend1
    expose:
      - '3000'
    networks:
      - lb

  backend2:
    build: .
    environment:
      PORT: '3000'
      BACKEND_LABEL: backend2
    expose:
      - '3000'
    networks:
      - lb

  backend3:
    build: .
    environment:
      PORT: '3000'
      BACKEND_LABEL: backend3
    expose:
      - '3000'
    networks:
      - lb

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - lb

  # haproxy:
  #   image: haproxy:alpine
  #   ports:
  #     - '8080:80'
  #   volumes:
  #     - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
  #   depends_on:
  #     - backend1
  #     - backend2
  #     - backend3
  #   networks:
  #     - lb

networks:
  lb:
    driver: bridge
